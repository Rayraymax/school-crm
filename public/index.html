<!DOCTYPE html>
<html lang="en">
<head>
  <title>CRM - Submit Lead</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <div class="lead-container">
    <h1>Submit New Lead</h1>
    <form id="leadForm">
      <!-- Lead Type -->
      <label>Lead Type:</label>
      <select name="lead_type" id="leadType" required>
        <option value="">--Select--</option>
        <option value="School">School</option>
        <option value="Firm">Firm / Corporate</option>
        <option value="Individual">Individual</option>
      </select>

      <!-- School Type (shown only if Lead Type = School) -->
      <div id="schoolTypeContainer">
        <label>School Type:</label>
        <select name="school_type">
          <option value="">--Select--</option>
          <option value="Primary">Primary</option>
          <option value="Secondary">Secondary</option>
          <option value="Private">Private</option>
          <option value="Public">Public</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <input type="text" name="location" placeholder="Location">
      <input type="text" name="contact_name" placeholder="Contact Name">

      <label>Contact Role:</label>
      <select name="contact_role">
        <option value="">--Select--</option>
        <option value="Principal">Principal</option>
        <option value="Administrator">Administrator</option>
        <option value="ICT Coordinator">ICT Coordinator</option>
        <option value="Teacher">Teacher</option>
        <option value="Other">Other</option>
      </select>

      <input type="tel" name="phone" placeholder="Phone">
      <input type="email" name="email" placeholder="Email">

      <label>Date of Visit:</label>
      <input type="date" name="visit_date">

      <label>Interest Level:</label>
      <select name="interest_level" required>
        <option value="">--Select--</option>
        <option value="Interested">Interested</option>
        <option value="Needs Follow-up">Needs Follow-up</option>
        <option value="Not Interested">Not Interested</option>
      </select>

      <label>Services of Interest (tick all that apply):</label>
      <div class="services-checkboxes">
        <label><input type="checkbox" name="services" value="Speed Governors"> Speed Governors</label>
        <label><input type="checkbox" name="services" value="Trackers"> Trackers</label>
        <label><input type="checkbox" name="services" value="Insurance"> Insurance</label>
        <label><input type="checkbox" name="services" value="Dashcams"> Dashcams</label>
        <label><input type="checkbox" name="services" value="CCTV"> CCTV</label>
        <label><input type="checkbox" name="services" value="Fuel Management"> Fuel Management</label>
        <label><input type="checkbox" name="services" value="TrackMyKid"> TrackMyKid</label>
      </div>

      <textarea name="notes" placeholder="Notes"></textarea>

      <label>Next Action:</label>
      <select name="next_action">
        <option value="">--Select--</option>
        <option value="Call">Call</option>
        <option value="Email">Email</option>
        <option value="Meeting">Meeting</option>
        <option value="Demo">Demo</option>
        <option value="Other">Other</option>
      </select>

      <label>Upload Image:</label>
      <input type="file" name="lead_image" accept="image/*"><br>

      <label>Follow-up Date:</label>
      <input type="date" name="follow_up_date">

      <button type="submit">Submit</button>
    </form>

    <button type="button" onclick="goToDashboard()">Back to Dashboard</button>
    <button type="button" onclick="goToLogin()">Back to Login</button>
  </div>

<script>
  // Show/hide School Type based on Lead Type
  const leadTypeSelect = document.getElementById('leadType');
  const schoolTypeContainer = document.getElementById('schoolTypeContainer');

  leadTypeSelect.addEventListener('change', () => {
    if (leadTypeSelect.value === 'School') {
      schoolTypeContainer.style.display = 'block';
    } else {
      schoolTypeContainer.style.display = 'none';
    }
  });

  // Default hide school type if not School
  if (leadTypeSelect.value !== 'School') {
    schoolTypeContainer.style.display = 'none';
  }

  const API_BASE =
    window.location.hostname === "localhost"
      ? "http://localhost:5000"
      : "https://school-crm-sndl.onrender.com";

  document.getElementById('leadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const token = localStorage.getItem('jwtToken');

    try {
      const response = await fetch(`${API_BASE}/api/leads`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`
        },
        body: formData
      });

      if (!response.ok) {
        const errorText = await response.text();
        throw new Error(errorText);
      }

      alert('🎉 Lead submitted successfully!');
      window.location.href = "success.html";
    } catch (error) {
      console.error("Submission error:", error);
      alert("Error submitting lead. Please try again.");
    }
  });

  function goToDashboard() {
    window.location.href = "dashboard.html";
  }

  function goToLogin() {
    window.location.href = "login.html";
  }
</script>
</body>
</html>
